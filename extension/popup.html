<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:300px;padding:14px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;color:#1F2937}
.header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.logo{width:32px;height:32px;background:#3B82F6;border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-weight:bold;font-size:16px;flex-shrink:0}
.title{font-size:15px;font-weight:700}.subtitle{font-size:11px;color:#9CA3AF}
.status-box{background:#F9FAFB;border-radius:8px;padding:10px;margin-bottom:12px;font-size:12px;display:flex;align-items:flex-start;gap:6px;flex-wrap:wrap}
.dot{width:8px;height:8px;border-radius:50%;margin-top:3px;flex-shrink:0}
.green{background:#10B981}.red{background:#EF4444}.yellow{background:#F59E0B;animation:pulse 1.5s infinite}.blue{background:#3B82F6;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.btn{width:100%;padding:9px;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;margin-bottom:6px}
.btn-p{background:#3B82F6;color:white}.btn-p:hover:not(:disabled){background:#2563EB}.btn-p:disabled{background:#93C5FD;cursor:not-allowed}
.btn-s{background:white;color:#374151;border:1px solid #D1D5DB}.btn-s:hover{background:#F9FAFB}
.hint{background:#FFFBEB;border:1px solid #FDE68A;border-radius:8px;padding:10px;font-size:11px;color:#92400E;margin-top:10px;display:none}
.hint code{background:#FEF3C7;padding:2px 6px;border-radius:4px;display:block;margin:4px 0;font-size:11px}
.footer{text-align:center;font-size:10px;color:#D1D5DB;margin-top:12px}
.detail{color:#6B7280;font-size:11px;margin-top:2px;width:100%}
</style>
</head>
<body>
<div class="header">
  <div class="logo">JR</div>
  <div>
    <div class="title">JobRadar</div>
    <div class="subtitle">个人效率助手</div>
  </div>
</div>

<div class="status-box">
  <div class="dot yellow" id="dot"></div>
  <span id="text">检查服务状态...</span>
  <div class="detail" id="detail"></div>
</div>

<button class="btn btn-p" id="extractBtn" disabled>提取并同步当前页面</button>
<button class="btn btn-s" id="dashboardBtn">打开岗位看板</button>

<div class="hint" id="hint">
  <div>如何启动本地服务？</div>
  <code>cd job-radar && npm run dev</code>
  <div>服务启动后运行在 localhost:3000</div>
</div>

<div class="footer">仅当前页面手动触发 · 数据仅存储于本地</div>

<script src="popup.js"></script>
</body>
</html>
